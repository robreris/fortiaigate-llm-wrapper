apiVersion: v1
kind: Secret
metadata:
  name: llm-wrapper-secrets
  namespace: fortiaigate
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  MCP_SERVER_URL: "${MCP_SERVER_URL}"
  MCP_SERVER_LABEL: "${MCP_SERVER_LABEL}"
  MCP_API_KEY: "${MCP_API_KEY}"
  DEFAULT_MODEL: "${DEFAULT_MODEL:-gpt-4o}"
  MCP_REQUIRE_APPROVAL: "${MCP_REQUIRE_APPROVAL:-never}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
