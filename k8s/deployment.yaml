apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-wrapper
  namespace: fortiaigate
  labels:
    app: llm-wrapper
    app.kubernetes.io/name: llm-wrapper
    app.kubernetes.io/part-of: fortiaigate-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-wrapper
  template:
    metadata:
      labels:
        app: llm-wrapper
    spec:
      terminationGracePeriodSeconds: 660
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llm-wrapper
          image: 228122752878.dkr.ecr.us-west-2.amazonaws.com/llm-wrapper:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: llm-wrapper-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          lifecycle:
            preStop:
              exec:
                # Allow in-flight agentic (multi-tool-call) requests to drain before SIGTERM
                command: ["sleep", "60"]
      volumes:
        - name: tmp
          emptyDir: {}
